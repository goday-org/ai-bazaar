name: docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'

permissions:
  contents: read

jobs:
  markdown-link-check:
    name: link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --offline
            --include-fragments
            --exclude-path 'docs/progress'
            './docs/**/*.md'
            './README.md'
            './SECURITY.md'
            './CONTRIBUTING.md'
          fail: true

  markdown-lint:
    name: markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            docs/**/*.md
            README.md
            SECURITY.md
            CONTRIBUTING.md

  proto-version-stamp:
    name: protocol version present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify protocol version line exists
        run: |
          if ! grep -qE '\*\*当前版本\*\*：`protocol_version: [0-9]+\.[0-9]+\.[0-9]+`' docs/PROTOCOL.md; then
            echo "::error file=docs/PROTOCOL.md::PROTOCOL.md must declare protocol_version near top"
            exit 1
          fi

  forbidden-words:
    name: forbidden phrasing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for legally-risky phrasing
        run: |
          set -e
          # Authoritative list lives in docs/PITFALLS.md §9.2.
          # Keep these two in sync when adding/removing phrases.
          FORBIDDEN=(
            "resell account"
            "share account credentials"
            "bypass subscription"
            "untraceable"
            "use anyone's claude subscription"
            "bypass openai subscription"
            "resell api access"
            "evade platform"
            "anti-fraud bypass"
            "反风控"
            "绕过风控"
          )
          FAIL=0
          for word in "${FORBIDDEN[@]}"; do
            # Skip docs that explicitly enumerate these as forbidden.
            if grep -RIin --include='*.md' \
                 --exclude='GLOSSARY.md' --exclude='HANDOFF.md' \
                 --exclude='PITFALLS.md' \
                 -F "$word" docs/ README.md SECURITY.md CONTRIBUTING.md 2>/dev/null; then
              echo "::error::forbidden phrase \"$word\" found"
              FAIL=1
            fi
          done
          exit $FAIL
